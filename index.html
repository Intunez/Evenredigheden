<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>DJ Cross Battle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎧 DJ Cross Battle</h1>
<p id="opdracht">Klik op start!</p>

<div class="grid">
  <div class="vak" data-id="a">a</div>
  <div class="vak" data-id="b">b</div>
  <div class="vak" data-id="c">c</div>
  <div class="vak" data-id="d">d</div>
</div>

<button onclick="startGame()">Start</button>
<button onclick="check()">Check</button>

<p id="feedback"></p>
<p>Score: <span id="score">0</span></p>

<script src="script.js"></script>

</body>
</html>
